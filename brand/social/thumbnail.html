<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: radial-gradient(1100px 700px at 18% 8%, #0f3d36 0%, #092925 55%, #061b18 100%);
    font-family: "Segoe UI", Arial, sans-serif; color: #F5F4ED;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 56px 72px;
  }
  .top { display: flex; align-items: center; gap: 24px; }
  .top img { height: 96px; }
  .badge {
    margin-left: auto; border: 1px solid #0F766E; color: #C9F36B;
    padding: 10px 22px; border-radius: 999px; font-size: 22px; letter-spacing: 1px;
  }
  h1 { font-size: 88px; line-height: 1.04; font-weight: 700; max-width: 950px; }
  h1 .mint { color: #C9F36B; }
  .sig { font-size: 34px; color: #8FA8A2; margin-top: 18px; }
  .bottom { display: flex; align-items: flex-end; justify-content: space-between; }
  .metric { font-size: 30px; color: #F5F4ED; }
  .metric strong { color: #C9F36B; font-size: 44px; display: block; }
  .who { font-size: 24px; color: #8FA8A2; text-align: right; }
</style>
<body>
  <div class="top">
    <img src="../logo/cabletwin-mark.svg" alt="">
    <span style="font-size:44px;font-weight:700">Cable<span class="mint">Twin</span></span>
    <span class="badge">2-MIN DEMO · SYNTHETIC DATA</span>
  </div>
  <div>
    <h1>When a line stops,<br>see <span class="mint">three routes</span> before deciding.</h1>
    <p class="sig">The Waze of the cable factory</p>
  </div>
  <div class="bottom">
    <p class="metric"><strong>620 → 140 min</strong>projected delay · simulated incident</p>
    <p class="who">Automate or Die 2026 · Industry<br>SUPCOM · Oussama Akir</p>
  </div>
</body>

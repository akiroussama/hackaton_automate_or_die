<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">CableTwin — decision-twin architecture</title>
  <desc id="desc">A synthetic Line 2 incident enters a deterministic decision twin, branches into Service, Cost and Stability recovery routes, is cross-checked by an exact bounded verifier, and stops at an explicit human approval decision.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061B18"/>
      <stop offset="0.55" stop-color="#092925"/>
      <stop offset="1" stop-color="#0B342E"/>
    </linearGradient>
    <radialGradient id="mintAura" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C9F36B" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#C9F36B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeAura" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E9763B" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#E9763B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="enginePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123E37"/>
      <stop offset="1" stop-color="#0B2F2A"/>
    </linearGradient>
    <linearGradient id="humanPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F4ED"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#8FA8A2" stroke-width="1" stroke-opacity="0.055"/>
      <circle cx="0" cy="0" r="1.5" fill="#C9F36B" fill-opacity="0.08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="15" stdDeviation="18" flood-color="#020B0A" flood-opacity="0.35"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#020B0A" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowMint" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5.5L0 11Z" fill="#C9F36B"/>
    </marker>
    <marker id="arrowOrange" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5.5L0 11Z" fill="#E9763B"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, Helvetica, sans-serif; }
      .cream { fill: #F5F4ED; }
      .mint { fill: #C9F36B; }
      .teal { fill: #49B7AB; }
      .soft { fill: #8FA8A2; }
      .orange { fill: #E9763B; }
      .ink { fill: #092925; }
      .eyebrow { font-size: 14px; font-weight: 700; letter-spacing: 2.8px; }
      .mono { font-family: Consolas, "Courier New", monospace; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <ellipse cx="705" cy="585" rx="620" ry="470" fill="url(#mintAura)"/>
  <ellipse cx="185" cy="570" rx="290" ry="360" fill="url(#orangeAura)"/>

  <!-- Brand header -->
  <g transform="translate(56 38)">
    <rect width="62" height="62" rx="16" fill="#0B312C" stroke="#0F766E" stroke-width="2"/>
    <path d="M12 20H50M12 42H50" stroke="#0F766E" stroke-width="5" stroke-linecap="round"/>
    <path d="M12 31H25M39 31H50" stroke="#0F766E" stroke-width="5" stroke-linecap="round"/>
    <circle cx="32" cy="31" r="4.5" fill="none" stroke="#E9763B" stroke-width="3"/>
    <path d="M23 31C26 19 38 19 42 31" fill="none" stroke="#C9F36B" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="136" y="77" font-size="32" font-weight="700" class="cream">Cable<tspan class="mint">Twin</tspan></text>

  <g transform="translate(1468 44)">
    <rect width="396" height="48" rx="24" fill="#0B312C" stroke="#0F766E" stroke-width="1.5"/>
    <circle cx="25" cy="24" r="5" fill="#C9F36B"/>
    <text x="43" y="29" font-size="15" font-weight="700" letter-spacing="1.4" class="cream">SYSTEM ARCHITECTURE · PHASE 2</text>
  </g>
  <text x="1864" y="118" text-anchor="end" font-size="15" class="soft">SUPCOM · Oussama Akir · Industry</text>

  <!-- Hero statement -->
  <text x="56" y="191" font-size="55" font-weight="750" class="cream">
    One line stops. <tspan class="mint">Three verified routes.</tspan> One human decides.
  </text>
  <text x="58" y="231" font-size="21" class="soft">Deterministic, offline decision support for cable-production recovery.</text>
  <path d="M58 262H1862" stroke="#0F766E" stroke-width="1.5" stroke-opacity="0.65"/>

  <!-- Stage labels -->
  <text x="58" y="317" class="eyebrow orange">01 · INCIDENT</text>
  <text x="422" y="317" class="eyebrow mint">02 · DECISION TWIN</text>
  <text x="1040" y="317" class="eyebrow teal">03 · RECOVERY ROUTES</text>
  <text x="1510" y="317" class="eyebrow cream">04 · FINAL AUTHORITY</text>

  <!-- Live-path connectors, behind cards -->
  <path d="M355 572C392 572 392 535 425 535" fill="none" stroke="#0F766E" stroke-width="13" stroke-linecap="round"/>
  <path d="M355 572C392 572 392 535 425 535" fill="none" stroke="#C9F36B" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrowMint)"/>

  <path d="M980 452C1010 452 1010 434 1040 434" fill="none" stroke="#0F766E" stroke-width="12" stroke-linecap="round"/>
  <path d="M980 452C1010 452 1010 434 1040 434" fill="none" stroke="#C9F36B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowMint)"/>
  <path d="M980 545H1040" fill="none" stroke="#0F766E" stroke-width="12" stroke-linecap="round"/>
  <path d="M980 545H1040" fill="none" stroke="#F5F4ED" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowMint)"/>
  <path d="M980 638C1010 638 1010 656 1040 656" fill="none" stroke="#0F766E" stroke-width="12" stroke-linecap="round"/>
  <path d="M980 638C1010 638 1010 656 1040 656" fill="none" stroke="#49B7AB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowMint)"/>

  <path d="M1454 434C1481 434 1481 457 1510 457" fill="none" stroke="#0F766E" stroke-width="11" stroke-linecap="round"/>
  <path d="M1454 434C1481 434 1481 457 1510 457" fill="none" stroke="#C9F36B" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrowMint)"/>
  <path d="M1454 545H1510" fill="none" stroke="#0F766E" stroke-width="11" stroke-linecap="round"/>
  <path d="M1454 545H1510" fill="none" stroke="#F5F4ED" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrowMint)"/>
  <path d="M1454 656C1481 656 1481 633 1510 633" fill="none" stroke="#0F766E" stroke-width="11" stroke-linecap="round"/>
  <path d="M1454 656C1481 656 1481 633 1510 633" fill="none" stroke="#49B7AB" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrowMint)"/>

  <!-- Incident card -->
  <g filter="url(#shadow)">
    <rect x="56" y="340" width="300" height="510" rx="28" fill="#0B2D29" stroke="#8B4A2D" stroke-width="2"/>
    <rect x="56" y="340" width="300" height="8" rx="4" fill="#E9763B"/>
  </g>
  <text x="88" y="391" font-size="17" font-weight="700" letter-spacing="1.5" class="soft">SYNTHETIC FACTORY</text>
  <text x="88" y="441" font-size="40" font-weight="800" class="cream">LINE 2 <tspan class="orange">STOP</tspan></text>
  <g transform="translate(88 477)">
    <text x="0" y="11" font-size="14" font-weight="700" class="soft">L1</text>
    <path d="M35 6H228" stroke="#49B7AB" stroke-width="8" stroke-linecap="round"/>
    <text x="0" y="78" font-size="14" font-weight="700" class="orange">L2</text>
    <path d="M35 73H105M157 73H228" stroke="#E9763B" stroke-width="8" stroke-linecap="round"/>
    <circle cx="131" cy="73" r="10" fill="#092925" stroke="#E9763B" stroke-width="5"/>
    <path d="M96 73C110 34 151 34 168 73" fill="none" stroke="#C9F36B" stroke-width="7" stroke-linecap="round"/>
    <circle cx="168" cy="73" r="6" fill="#C9F36B"/>
    <text x="0" y="145" font-size="14" font-weight="700" class="soft">L3</text>
    <path d="M35 140H228" stroke="#49B7AB" stroke-width="8" stroke-linecap="round"/>
  </g>
  <rect x="88" y="675" width="236" height="62" rx="16" fill="#3B261F" stroke="#E9763B" stroke-width="1.5"/>
  <text x="206" y="700" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="1.2" class="orange">DOWNTIME WINDOW</text>
  <text x="206" y="724" text-anchor="middle" font-size="23" font-weight="750" class="cream">10:00 — 14:00</text>
  <text x="88" y="777" font-size="17" class="cream">3 lines · 10 orders</text>

  <!-- Decision twin card -->
  <g filter="url(#shadow)">
    <rect x="422" y="340" width="558" height="400" rx="30" fill="url(#enginePanel)" stroke="#58A99F" stroke-width="2"/>
    <rect x="422" y="340" width="558" height="8" rx="4" fill="#C9F36B"/>
  </g>
  <text x="458" y="395" font-size="16" font-weight="700" letter-spacing="1.5" class="mint">DETERMINISTIC PLANNER</text>
  <text x="458" y="441" font-size="38" font-weight="780" class="cream">Decision twin</text>

  <!-- Core process -->
  <g filter="url(#smallShadow)">
    <rect x="458" y="477" width="140" height="68" rx="18" fill="#0A2824" stroke="#49B7AB" stroke-width="1.5"/>
    <rect x="628" y="477" width="156" height="68" rx="18" fill="#173D32" stroke="#C9F36B" stroke-width="2"/>
    <rect x="814" y="477" width="130" height="68" rx="18" fill="#0A2824" stroke="#49B7AB" stroke-width="1.5"/>
  </g>
  <text x="528" y="505" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1" class="soft">VALIDATE</text>
  <text x="528" y="528" text-anchor="middle" font-size="18" font-weight="700" class="cream">Constraints</text>
  <text x="706" y="505" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1" class="mint">GENERATE</text>
  <text x="706" y="528" text-anchor="middle" font-size="18" font-weight="750" class="cream">3 plans</text>
  <text x="879" y="505" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1" class="soft">COMPARE</text>
  <text x="879" y="528" text-anchor="middle" font-size="18" font-weight="700" class="cream">KPIs</text>
  <path d="M598 511H622" stroke="#C9F36B" stroke-width="3" marker-end="url(#arrowMint)"/>
  <path d="M784 511H808" stroke="#C9F36B" stroke-width="3" marker-end="url(#arrowMint)"/>

  <text x="458" y="585" font-size="14" font-weight="700" letter-spacing="1.1" class="soft">HARD CONSTRAINTS</text>
  <g font-size="14.5" class="cream">
    <rect x="458" y="605" width="124" height="38" rx="19" fill="#092925" stroke="#0F766E"/>
    <text x="520" y="629" text-anchor="middle">Compatibility</text>
    <rect x="591" y="605" width="112" height="38" rx="19" fill="#092925" stroke="#0F766E"/>
    <text x="647" y="629" text-anchor="middle">No overlap</text>
    <rect x="712" y="605" width="128" height="38" rx="19" fill="#092925" stroke="#0F766E"/>
    <text x="776" y="629" text-anchor="middle">Incident window</text>
    <rect x="849" y="605" width="95" height="38" rx="19" fill="#092925" stroke="#0F766E"/>
    <text x="896" y="629" text-anchor="middle">Horizon</text>
  </g>
  <rect x="458" y="672" width="486" height="42" rx="21" fill="#172F20" stroke="#769834" stroke-width="1.2"/>
  <text x="701" y="699" text-anchor="middle" font-size="16" font-weight="650" class="mint">Explainable search · No LLM · No external model</text>

  <!-- Separate verifier rail -->
  <g filter="url(#smallShadow)">
    <rect x="422" y="760" width="558" height="90" rx="22" fill="#071F1C" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="7 5"/>
  </g>
  <text x="448" y="789" font-size="11.5" font-weight="700" letter-spacing="1.3" class="soft">SEPARATE EXACT ENUMERATION PATH</text>
  <text x="956" y="789" text-anchor="end" font-size="10.5" class="soft">exact for the encoded bounded demo</text>
  <text x="505" y="826" text-anchor="middle" font-size="26" font-weight="800" class="cream">17,856</text>
  <text x="505" y="845" text-anchor="middle" font-size="9.5" class="soft">assignment / sequence candidates</text>
  <text x="602" y="828" text-anchor="middle" font-size="24" font-weight="700" class="mint">→</text>
  <text x="700" y="826" text-anchor="middle" font-size="26" font-weight="800" class="cream">10,440</text>
  <text x="700" y="845" text-anchor="middle" font-size="9.5" class="soft">feasible schedules</text>
  <text x="797" y="828" text-anchor="middle" font-size="24" font-weight="700" class="mint">→</text>
  <text x="875" y="826" text-anchor="middle" font-size="26" font-weight="800" class="mint">3</text>
  <text x="875" y="845" text-anchor="middle" font-size="9.5" class="soft">unique declared-policy optima</text>

  <!-- Recovery routes -->
  <g filter="url(#shadow)">
    <rect x="1040" y="340" width="414" height="510" rx="28" fill="#0B2D29" stroke="#27655E" stroke-width="2"/>
  </g>
  <text x="1072" y="389" font-size="17" font-weight="700" letter-spacing="1.2" class="soft">THREE DECLARED POLICIES</text>

  <g filter="url(#smallShadow)">
    <rect x="1072" y="412" width="350" height="104" rx="20" fill="#173D32" stroke="#C9F36B" stroke-width="2"/>
    <rect x="1072" y="535" width="350" height="104" rx="20" fill="#183B35" stroke="#F5F4ED" stroke-opacity="0.75" stroke-width="1.5"/>
    <rect x="1072" y="658" width="350" height="104" rx="20" fill="#123E39" stroke="#49B7AB" stroke-width="1.5"/>
  </g>

  <circle cx="1102" cy="445" r="9" fill="#C9F36B"/>
  <text x="1124" y="449" font-size="16" font-weight="750" letter-spacing="1.1" class="mint">SERVICE</text>
  <text x="1102" y="489" font-size="31" font-weight="800" class="cream">140 min delay</text>

  <circle cx="1102" cy="568" r="9" fill="#F5F4ED"/>
  <text x="1124" y="572" font-size="16" font-weight="750" letter-spacing="1.1" class="cream">COST</text>
  <text x="1102" y="612" font-size="31" font-weight="800" class="cream">1,931.45 DT*</text>

  <circle cx="1102" cy="691" r="9" fill="#49B7AB"/>
  <text x="1124" y="695" font-size="16" font-weight="750" letter-spacing="1.1" class="teal">STABILITY</text>
  <text x="1102" y="735" font-size="31" font-weight="800" class="cream">0 moves</text>

  <text x="1072" y="798" font-size="14.5" class="cream">Side-by-side Gantt + KPI preview</text>
  <text x="1422" y="826" text-anchor="end" font-size="11.5" class="soft">*illustrative synthetic comparison output</text>

  <!-- Human authority -->
  <g filter="url(#shadow)">
    <rect x="1510" y="340" width="354" height="510" rx="28" fill="url(#humanPanel)" stroke="#C9F36B" stroke-width="2"/>
    <rect x="1510" y="340" width="354" height="8" rx="4" fill="#C9F36B"/>
  </g>
  <text x="1542" y="392" font-size="15" font-weight="750" letter-spacing="1.35" class="ink">HUMAN IN COMMAND</text>
  <g transform="translate(1542 425)">
    <circle cx="34" cy="28" r="19" fill="#0F766E"/>
    <path d="M5 78C8 50 21 42 34 42C47 42 60 50 63 78" fill="#0F766E"/>
    <path d="M70 22H262" stroke="#D6DDD5" stroke-width="2"/>
    <text x="82" y="51" font-size="30" font-weight="800" class="ink">Production</text>
    <text x="82" y="82" font-size="30" font-weight="800" class="ink">manager</text>
  </g>

  <g transform="translate(1542 550)">
    <circle cx="16" cy="10" r="15" fill="#E6F1EF"/>
    <text x="16" y="16" text-anchor="middle" font-size="15" font-weight="800" class="ink">1</text>
    <text x="44" y="16" font-size="17" font-weight="650" class="ink">Preview Gantt + KPIs</text>
    <path d="M16 28V58" stroke="#8FA8A2" stroke-width="2"/>
    <circle cx="16" cy="76" r="15" fill="#E6F1EF"/>
    <text x="16" y="82" text-anchor="middle" font-size="15" font-weight="800" class="ink">2</text>
    <text x="44" y="82" font-size="17" font-weight="650" class="ink">Review trade-offs</text>
    <path d="M16 94V124" stroke="#8FA8A2" stroke-width="2"/>
    <circle cx="16" cy="142" r="15" fill="#C9F36B"/>
    <text x="16" y="148" text-anchor="middle" font-size="15" font-weight="800" class="ink">3</text>
    <text x="44" y="148" font-size="17" font-weight="750" class="ink">Explicitly approve</text>
  </g>

  <rect x="1542" y="748" width="290" height="54" rx="15" fill="#FFF0E8" stroke="#E9763B" stroke-width="1.5"/>
  <circle cx="1570" cy="775" r="9" fill="none" stroke="#E9763B" stroke-width="3"/>
  <path d="M1564 769L1576 781M1576 769L1564 781" stroke="#E9763B" stroke-width="2"/>
  <text x="1590" y="780" font-size="15" font-weight="800" letter-spacing="0.6" fill="#B4501F">NO MACHINE COMMAND</text>
  <text x="1542" y="828" font-size="11.5" class="ink">In-memory approval + timestamped audit event</text>

  <!-- Deployment boundary -->
  <g filter="url(#smallShadow)">
    <rect x="56" y="906" width="1808" height="126" rx="26" fill="#081F1C" stroke="#0F766E" stroke-width="1.5"/>
  </g>
  <text x="84" y="941" font-size="12.5" font-weight="700" letter-spacing="1.8" class="mint">DEPLOYMENT BOUNDARY</text>
  <g font-size="14" font-weight="700" letter-spacing="0.8" class="cream">
    <rect x="84" y="960" width="190" height="42" rx="21" fill="#12352F" stroke="#0F766E"/>
    <text x="179" y="987" text-anchor="middle">SYNTHETIC DATA</text>
    <rect x="292" y="960" width="136" height="42" rx="21" fill="#12352F" stroke="#0F766E"/>
    <text x="360" y="987" text-anchor="middle">OFFLINE</text>
    <rect x="446" y="960" width="152" height="42" rx="21" fill="#12352F" stroke="#0F766E"/>
    <text x="522" y="987" text-anchor="middle">READ-ONLY</text>
    <rect x="616" y="960" width="240" height="42" rx="21" fill="#12352F" stroke="#0F766E"/>
    <text x="736" y="987" text-anchor="middle">NO MACHINE CONTROL</text>
    <rect x="874" y="960" width="156" height="42" rx="21" fill="#173D32" stroke="#C9F36B"/>
    <text x="952" y="987" text-anchor="middle" class="mint">9/9 CHECKS</text>
  </g>
  <text x="1090" y="974" font-size="12.5" class="soft mono">factory-data.js → twin-engine.js → app/*</text>
  <text x="1834" y="974" text-anchor="end" font-size="12.5" class="soft">Local browser · zero application dependencies</text>
  <text x="1834" y="1001" text-anchor="end" font-size="11.5" class="soft">Architecture reflects the frozen Phase 2 runtime baseline.</text>
</svg>
